# ============================================================================
# FormicOS Experimentable Parameters — Whitelist
# v0.12.0
# ============================================================================
#
# Only parameters listed here can be mutated by the ExperimentEngine.
# Each entry specifies the dot-path into caste_recipes.yaml, the value type,
# and valid bounds.  The Queen cannot experiment outside this whitelist.
# ============================================================================

experimentable_params:

  # ── Coder caste ──────────────────────────────────────────────────────────
  - path: "recipes.coder.temperature"
    type: float
    min: 0.0
    max: 1.0

  - path: "recipes.coder.max_tokens"
    type: int
    min: 1000
    max: 16000

  - path: "recipes.coder.context_window"
    type: int
    min: 4096
    max: 131072

  # ── Architect caste ─────────────────────────────────────────────────────
  - path: "recipes.architect.temperature"
    type: float
    min: 0.0
    max: 1.0

  - path: "recipes.architect.max_tokens"
    type: int
    min: 2000
    max: 16000

  # ── Researcher caste ────────────────────────────────────────────────────
  - path: "recipes.researcher.temperature"
    type: float
    min: 0.0
    max: 1.0

  # ── Manager caste ──────────────────────────────────────────────────────
  - path: "recipes.manager.temperature"
    type: float
    min: 0.0
    max: 0.5

  # ── Reviewer caste ─────────────────────────────────────────────────────
  - path: "recipes.reviewer.temperature"
    type: float
    min: 0.0
    max: 0.3

  # ── Governance triggers ────────────────────────────────────────────────
  - path: "recipes.coder.governance_triggers.stall_repeat_threshold"
    type: int
    min: 2
    max: 10

  - path: "recipes.architect.governance_triggers.similarity_threshold"
    type: float
    min: 0.70
    max: 0.99

  - path: "recipes.architect.governance_triggers.rounds_before_force_halt"
    type: int
    min: 1
    max: 10
