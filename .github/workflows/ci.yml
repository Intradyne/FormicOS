name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/
      - name: Ruff format check
        run: uv run ruff format --check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --dev
      - name: Pyright
        run: uv run pyright src/

  layer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --dev
      - name: Layer boundary lint
        run: uv run python scripts/lint_imports.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --dev
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short
      - name: Contract tests
        run: uv run pytest tests/contract/ -v --tb=short
      - name: Feature tests
        run: uv run pytest tests/features/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Frontend build
        run: cd frontend && npm run build

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, layer-check, test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t formicos:test .
