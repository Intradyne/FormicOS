description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: tree-building\n\nINSTRUCTIONS:\n\
  # Instructions\n\nRefactor a tree building algorithm.\n\nSome web-forums have a tree layout, so posts are presented as a\
  \ tree.\nHowever the posts are typically stored in a database as an unsorted set of records.\nThus when presenting the posts\
  \ to the user the tree structure has to be reconstructed.\n\nYour job will be to refactor a working but slow and ugly piece\
  \ of code that implements the tree building logic for highly abstracted records.\nThe records only contain an ID number\
  \ and a parent ID number.\nThe ID number is always between 0 (inclusive) and the length of the record list (exclusive).\n\
  All records have a parent ID lower than their own ID, except for the root record, which has a parent ID that's equal to\
  \ its own ID.\n\nAn example tree:\n\n```text\nroot (ID: 0, parent ID: 0)\n|-- child1 (ID: 1, parent ID: 0)\n|    |-- grandchild1\
  \ (ID: 2, parent ID: 1)\n|    +-- grandchild2 (ID: 4, parent ID: 1)\n+-- child2 (ID: 3, parent ID: 0)\n|    +-- grandchild3\
  \ (ID: 6, parent ID: 3)\n+-- child3 (ID: 5, parent ID: 0)\n```\n\n\n# Instructions append\n\n## Exception messages\n\nSometimes\
  \ it is necessary to [raise an exception](https://docs.python.org/3/tutorial/errors.html#raising-exceptions). When you do\
  \ this, you should always include a **meaningful error message** to indicate what the source of the error is. This makes\
  \ your code more readable and helps significantly with debugging. For situations where you know that the error source will\
  \ be a certain type, you can choose to raise one of the [built in error types](https://docs.python.org/3/library/exceptions.html#base-classes),\
  \ but should still include a meaningful message.\n\nThis particular exercise requires that you refactor how/where the [raise\
  \ statement](https://docs.python.org/3/reference/simple_stmts.html#the-raise-statement) is used to \"throw\" a `ValueError`\
  \ for invalid tree input. The tests will only pass if the code both `raise`s the appropriate `exception` and includes an\
  \ appropriate message with it.\n\nSTARTER CODE:\nFILE: tree_building.py\n```\nclass Record:\n    def __init__(self, record_id,\
  \ parent_id):\n        self.record_id = record_id\n        self.parent_id = parent_id\n\n\nclass Node:\n    def __init__(self,\
  \ node_id):\n        self.node_id = node_id\n        self.children = []\n\n\ndef BuildTree(records):\n    root = None\n\
  \    records.sort(key=lambda x: x.record_id)\n    ordered_id = [i.record_id for i in records]\n    if records:\n       \
  \ if ordered_id[-1] != len(ordered_id) - 1:\n            raise ValueError('broken tree')\n        if ordered_id[0] != 0:\n\
  \            raise ValueError('invalid')\n    trees = []\n    parent = {}\n    for i in range(len(ordered_id)):\n      \
  \  for j in records:\n            if ordered_id[i] == j.record_id:\n                if j.record_id == 0:\n             \
  \       if j.parent_id != 0:\n                        raise ValueError('error!')\n                if j.record_id < j.parent_id:\n\
  \                    raise ValueError('something went wrong!')\n                if j.record_id == j.parent_id:\n       \
  \             if j.record_id != 0:\n                        raise ValueError('error!')\n                trees.append(Node(ordered_id[i]))\n\
  \    for i in range(len(ordered_id)):\n        for j in trees:\n            if i == j.node_id:\n                parent =\
  \ j\n        for j in records:\n            if j.parent_id == i:\n                for k in trees:\n                    if\
  \ k.node_id == 0:\n                        continue\n                    if j.record_id == k.node_id:\n                \
  \        child = k\n                        parent.children.append(child)\n    if len(trees) > 0:\n        root = trees[0]\n\
  \    return root\n\n```\n\nTEST FILE:\nFILE: tree_building_test.py\n```\nimport unittest\n\nfrom tree_building import Record,\
  \ BuildTree\n\n\nclass TreeBuildingTest(unittest.TestCase):\n    \"\"\"\n        Record(record_id, parent_id): records given\
  \ to be processed\n        Node(node_id): Node in tree\n        BuildTree(records): records as argument and returns tree\n\
  \        BuildTree should raise ValueError if given records are invalid\n    \"\"\"\n\n    def test_empty_list_input(self):\n\
  \        records = []\n        root = BuildTree(records)\n        self.assertIsNone(root)\n\n    def test_one_node(self):\n\
  \        records = [\n            Record(0, 0)\n        ]\n        root = BuildTree(records)\n\n        self.assert_node_is_leaf(root,\
  \ node_id=0)\n\n    def test_three_nodes_in_order(self):\n        records = [\n            Record(0, 0),\n            Record(1,\
  \ 0),\n            Record(2, 0)\n        ]\n        root = BuildTree(records)\n\n        self.assert_node_is_branch(root,\
  \ node_id=0, children_count=2)\n        self.assert_node_is_leaf(root.children[0], node_id=1)\n        self.assert_node_is_leaf(root.children[1],\
  \ node_id=2)\n\n    def test_three_nodes_in_reverse_order(self):\n        records = [\n            Record(2, 0),\n     \
  \       Record(1, 0),\n            Record(0, 0)\n        ]\n        root = BuildTree(records)\n\n        self.assert_node_is_branch(root,\
  \ node_id=0, children_count=2)\n        self.assert_node_is_leaf(root.children[0], node_id=1)\n        self.assert_node_is_leaf(root.children[1],\
  \ node_id=2)\n\n    def test_more_than_two_children(self):\n        records = [\n            Record(0, 0),\n           \
  \ Record(1, 0),\n            Record(2, 0),\n            Record(3, 0)\n        ]\n        root = BuildTree(records)\n\n \
  \       self.assert_node_is_branch(root, node_id=0, children_count=3)\n        self.assert_node_is_leaf(root.children[0],\
  \ node_id=1)\n        self.assert_node_is_leaf(root.children[1], node_id=2)\n        self.assert_node_is_leaf(root.children[2],\
  \ node_id=3)\n\n    def test_binary_tree(self):\n        records = [\n            Record(6, 2),\n            Record(0, 0),\n\
  \            Record(3, 1),\n            Record(2, 0),\n            Record(4, 1),\n            Record(5, 2),\n          \
  \  Record(1, 0)\n        ]\n        root = BuildTree(records)\n\n        self.assert_node_is_branch(root, 0, 2)\n      \
  \  self.assert_node_is_branch(root.children[0], 1, 2)\n        self.assert_node_is_branch(root.children[1], 2, 2)\n    \
  \    self.assert_node_is_leaf(root.children[0].children[0], 3)\n        self.assert_node_is_leaf(root.children[0].children[1],\
  \ 4)\n        self.assert_node_is_leaf(root.children[1].children[0], 5)\n        self.assert_node_is_leaf(root.children[1].children[1],\
  \ 6)\n\n    def test_unbalanced_tree(self):\n        records = [\n            Record(0, 0),\n            Record(1, 0),\n\
  \            Record(2, 0),\n            Record(3, 1),\n            Record(4, 1),\n            Record(5, 1),\n          \
  \  Record(6, 2),\n        ]\n        root = BuildTree(records)\n\n        self.assert_node_is_branch(root, 0, 2)\n     \
  \   self.assert_node_is_branch(root.children[0], 1, 3)\n        self.assert_node_is_branch(root.children[1], 2, 1)\n   \
  \     self.assert_node_is_leaf(root.children[0].children[0], 3)\n        self.assert_node_is_leaf(root.children[0].children[1],\
  \ 4)\n        self.assert_node_is_leaf(root.children[0].children[2], 5)\n        self.assert_node_is_leaf(root.children[1].children[0],\
  \ 6)\n\n    def test_root_node_has_parent(self):\n        records = [\n            Record(0, 1),\n            Record(1,\
  \ 0)\n        ]\n        # Root parent_id should be equal to record_id(0)\n        with self.assertRaises(ValueError) as\
  \ err:\n            BuildTree(records)\n        self.assertEqual(type(err.exception), ValueError)\n        self.assertEqual(err.exception.args[0],\
  \ \"Node parent_id should be smaller than it's record_id.\")\n\n    def test_no_root_node(self):\n        records = [\n\
  \            Record(1, 0),\n            Record(2, 0)\n        ]\n        # Record with record_id 0 (root) is missing\n \
  \       with self.assertRaises(ValueError) as err:\n            BuildTree(records)\n        self.assertEqual(type(err.exception),\
  \ ValueError)\n        self.assertEqual(err.exception.args[0], \"Record id is invalid or out of order.\")\n\n    def test_non_continuous(self):\n\
  \        records = [\n            Record(2, 0),\n            Record(4, 2),\n            Record(1, 0),\n            Record(0,\
  \ 0)\n        ]\n        # Record with record_id 3 is missing\n        with self.assertRaises(ValueError) as err:\n    \
  \        BuildTree(records)\n        self.assertEqual(type(err.exception), ValueError)\n        self.assertEqual(err.exception.args[0],\
  \ \"Record id is invalid or out of order.\")\n\n    def test_cycle_directly(self):\n        records = [\n            Record(5,\
  \ 2),\n            Record(3, 2),\n            Record(2, 2),\n            Record(4, 1),\n            Record(1, 0),\n    \
  \        Record(0, 0),\n            Record(6, 3)\n        ]\n        # Cycle caused by Record 2 with parent_id pointing\
  \ to itself\n        with self.assertRaises(ValueError) as err:\n            BuildTree(records)\n        self.assertEqual(type(err.exception),\
  \ ValueError)\n        self.assertEqual(err.exception.args[0], \"Only root should have equal record and parent id.\")\n\n\
  \    def test_cycle_indirectly(self):\n        records = [\n            Record(5, 2),\n            Record(3, 2),\n     \
  \       Record(2, 6),\n            Record(4, 1),\n            Record(1, 0),\n            Record(0, 0),\n            Record(6,\
  \ 3)\n        ]\n        # Cycle caused by Record 2 with parent_id(6) greater than record_id(2)\n        with self.assertRaises(ValueError)\
  \ as err:\n            BuildTree(records)\n        self.assertEqual(type(err.exception), ValueError)\n        self.assertEqual(err.exception.args[0],\
  \ \"Node parent_id should be smaller than it's record_id.\")\n\n    def test_higher_id_parent_of_lower_id(self):\n     \
  \   records = [\n            Record(0, 0),\n            Record(2, 0),\n            Record(1, 2)\n        ]\n        # Record\
  \ 1 have parent_id(2) greater than record_id(1)\n        with self.assertRaises(ValueError) as err:\n            BuildTree(records)\n\
  \        self.assertEqual(type(err.exception), ValueError)\n        self.assertEqual(err.exception.args[0], \"Node parent_id\
  \ should be smaller than it's record_id.\")\n\n    def assert_node_is_branch(self, node, node_id, children_count):\n   \
  \     self.assertEqual(node.node_id, node_id)\n        self.assertNotEqual(len(node.children), 0)\n        self.assertEqual(len(node.children),\
  \ children_count)\n\n    def assert_node_is_leaf(self, node, node_id):\n        self.assertEqual(node.node_id, node_id)\n\
  \        self.assertEqual(len(node.children), 0)\n\n```\n\nYour task: Edit the starter code file(s) so ALL tests pass.\n\
  Use write_workspace_file to write your solution, then use\nworkspace_execute to run the tests.\n\nTEST COMMAND: python -m\
  \ unittest tree_building_test.py -v 2>&1\n\nIf tests fail, read the error output carefully, fix your code,\nand run the\
  \ tests again.\n\nWrite your solution in the starter file. The test file imports from the solution module. Run tests with\
  \ workspace_execute.\n\nUse any Available Knowledge entries — they contain patterns\nfrom prior exercises that may help\
  \ you avoid common mistakes."
