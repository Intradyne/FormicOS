  \ data type you need to support is signed integers of at least 16 bits size.\n\nYou should use the following rules for the\
  \ syntax: a number is a sequence of one or more (ASCII) digits, a word is a sequence of one or more letters, digits, symbols\
  \ or punctuation that is not a number.\n(Forth probably uses slightly different rules, but this is close enough.)\n\nWords\
  \ are case-insensitive.\n\n[forth]: https://en.wikipedia.org/wiki/Forth_%28programming_language%29\n\n\n# Instructions append\n\
  \n## Customizing and Raising Exceptions\n\nSometimes it is necessary to both [customize](https://docs.python.org/3/tutorial/errors.html#user-defined-exceptions)\
  \ and [`raise`](https://docs.python.org/3/tutorial/errors.html#raising-exceptions) exceptions in your code. When you do\
  \ this, you should always include a **meaningful error message** to indicate what the source of the error is. This makes\
  \ your code more readable and helps significantly with debugging. \n\nCustom exceptions can be created through new exception\
  \ classes (see [`classes`](https://docs.python.org/3/tutorial/classes.html#tut-classes) for more detail.) that are typically\
  \ subclasses of [`Exception`](https://docs.python.org/3/library/exceptions.html#Exception).\n\nFor situations where you\
  \ know the error source will be a derivative of a certain exception type, you can choose to inherit from one of the [`built\
  \ in error types`](https://docs.python.org/3/library/exceptions.html#base-classes) under the _Exception_ class. When raising\
  \ the error, you should still include a meaningful message.\n\nThis particular exercise requires that you create a _custom\
  \ exception_ to be [raised](https://docs.python.org/3/reference/simple_stmts.html#the-raise-statement)/\"thrown\" when the\
  \ stack is not sufficiently filled. The tests will only pass if you customize an appropriate exception, `raise` that exception,\
  \ and include appropriate error messages.\n\n\n```python\n# subclassing the Exception to create a StackUnderflowError\n\
  class StackUnderflowError(Exception):\n    \"\"\"Exception raised when Stack is not full.\n       message: explanation of\
  \ the error.\n    \"\"\"\n    def __init__(self, message):\n        self.message = message\n\n        \n# raising a StackUnderflowError\n\
  raise StackUnderflowError(\"Insufficient number of items in stack\")\n```\n\nAdditionally, this exercise requires that you\
  \ raise several `built-in exceptions` with error messages.\nTo raise a `built-in exception` with a message, write the message\
