  \ beats purity.\nErrors should never pass silently.\nUnless explicitly silenced.\nIn the face of ambiguity, refuse the temptation\
  \ to guess.\nThere should be one-- and preferably only one --obvious way to do it.\nAlthough that way may not be obvious\
  \ at first unless you're Dutch.\nNow is better than never.\nAlthough never is often better than *right* now.\nIf the implementation\
  \ is hard to explain, it's a bad idea.\nIf the implementation is easy to explain, it may be a good idea.\nNamespaces are\
  \ one honking great idea -- let's do more of those!\n\"\"\"\n\n\nclass MockException(Exception):\n    pass\n\n\nclass MockFile(io.BytesIO):\n\
  \    def __init__(self, *args, chunk=None, exception=None, **kwargs):\n        super(MockFile, self).__init__(*args, **kwargs)\n\
  \        self.__chunk = chunk\n        self.__exception = exception\n\n    def __exit__(self, exc_type, exc_val, exc_tb):\n\
