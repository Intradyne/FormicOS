description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: hangman\n\nINSTRUCTIONS:\n# Instructions\n\
  \nImplement the logic of the hangman game using functional reactive programming.\n\n[Hangman][hangman] is a simple word\
  \ guessing game.\n\n[Functional Reactive Programming][frp] is a way to write interactive programs.\nIt differs from the\
  \ usual perspective in that instead of saying \"when the button is pressed increment the counter\", you write \"the value\
  \ of the counter is the sum of the number of times the button is pressed.\"\n\nImplement the basic logic behind hangman\
  \ using functional reactive programming.\nYou'll need to install an FRP library for this, this will be described in the\
  \ language/track specific files of the exercise.\n\n[hangman]: https://en.wikipedia.org/wiki/Hangman_%28game%29\n[frp]:\
  \ https://en.wikipedia.org/wiki/Functional_reactive_programming\n\n\n# Instructions append\n\n## Python Special Instructions\n\
  \nA third party library **is not required** for this exercise.  Please ignore the instructions regarding **FRP library**.\n\
  \n\n## Exception messages\n\nSometimes it is necessary to [raise an exception](https://docs.python.org/3/tutorial/errors.html#raising-exceptions).\
  \ When you do this, you should always include a **meaningful error message** to indicate what the source of the error is.\
  \ This makes your code more readable and helps significantly with debugging. For situations where you know that the error\
  \ source will be a certain type, you can choose to raise one of the [built in error types](https://docs.python.org/3/library/exceptions.html#base-classes),\
  \ but should still include a meaningful message.\n\nThis particular exercise requires that you use the [raise statement](https://docs.python.org/3/reference/simple_stmts.html#the-raise-statement)\
  \ to \"throw\" a `ValueError` when the game has ended but the player tries to continue playing. The tests will only pass\
  \ if you both `raise` the `exception` and include a message with it.\n\nTo raise a `ValueError` with a message, write the\
  \ message as an argument to the `exception` type:\n\n```python\n# when player tries to play, but the game is already over.\n\
  raise ValueError(\"The game has already ended.\")\n```\n\nSTARTER CODE:\nFILE: hangman.py\n```\n# Game status categories\n\
  # Change the values as you see fit\nSTATUS_WIN = 'win'\nSTATUS_LOSE = 'lose'\nSTATUS_ONGOING = 'ongoing'\n\n\nclass Hangman:\n\
  \    def __init__(self, word):\n        self.remaining_guesses = 9\n        self.status = STATUS_ONGOING\n\n    def guess(self,\
  \ char):\n        pass\n\n    def get_masked_word(self):\n        pass\n\n    def get_status(self):\n        pass\n\n```\n\
  \nTEST FILE:\nFILE: hangman_test.py\n```\nimport unittest\n\nimport hangman\nfrom hangman import Hangman\n\n\n# Tests adapted\
  \ from csharp//hangman/HangmanTest.cs\n\nclass HangmanTests(unittest.TestCase):\n    def test_initially_9_failures_are_allowed(self):\n\
  \        game = Hangman('foo')\n        self.assertEqual(game.get_status(), hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses,\
  \ 9)\n\n    def test_initially_no_letters_are_guessed(self):\n        game = Hangman('foo')\n\n        self.assertEqual(game.get_masked_word(),\
  \ '___')\n\n    def test_after_10_failures_the_game_is_over(self):\n        game = Hangman('foo')\n\n        for i in range(10):\n\
  \            game.guess('x')\n\n        self.assertEqual(game.get_status(), hangman.STATUS_LOSE)\n        with self.assertRaises(ValueError)\
  \ as err:\n            game.guess('x')\n        self.assertEqual(type(err.exception), ValueError)\n        self.assertEqual(err.exception.args[0],\
  \ \"The game has already ended.\")\n\n    def test_feeding_a_correct_letter_removes_underscores(self):\n        game = Hangman('foobar')\n\
  \n        game.guess('b')\n        self.assertEqual(game.get_status(), hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses,\
  \ 9)\n        self.assertEqual(game.get_masked_word(), '___b__')\n\n        game.guess('o')\n        self.assertEqual(game.get_status(),\
  \ hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses, 9)\n        self.assertEqual(game.get_masked_word(),\
  \ '_oob__')\n\n    def test_feeding_a_correct_letter_twice_counts_as_a_failure(self):\n        game = Hangman('foobar')\n\
  \n        game.guess('b')\n        self.assertEqual(game.get_status(), hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses,\
  \ 9)\n        self.assertEqual(game.get_masked_word(), '___b__')\n\n        game.guess('b')\n        self.assertEqual(game.get_status(),\
  \ hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses, 8)\n        self.assertEqual(game.get_masked_word(),\
  \ '___b__')\n\n    def test_getting_all_the_letters_right_makes_for_a_win(self):\n        game = Hangman('hello')\n\n  \
  \      game.guess('b')\n        self.assertEqual(game.get_status(), hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses,\
  \ 8)\n        self.assertEqual(game.get_masked_word(), '_____')\n\n        game.guess('e')\n        self.assertEqual(game.get_status(),\
  \ hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses, 8)\n        self.assertEqual(game.get_masked_word(),\
  \ '_e___')\n\n        game.guess('l')\n        self.assertEqual(game.get_status(), hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses,\
  \ 8)\n        self.assertEqual(game.get_masked_word(), '_ell_')\n\n        game.guess('o')\n        self.assertEqual(game.get_status(),\
  \ hangman.STATUS_ONGOING)\n        self.assertEqual(game.remaining_guesses, 8)\n        self.assertEqual(game.get_masked_word(),\
  \ '_ello')\n\n        game.guess('h')\n        self.assertEqual(game.get_status(), hangman.STATUS_WIN)\n        self.assertEqual(game.get_masked_word(),\
  \ 'hello')\n\n        with self.assertRaises(ValueError) as err:\n            game.guess('x')\n        self.assertEqual(type(err.exception),\
  \ ValueError)\n        self.assertEqual(err.exception.args[0], \"The game has already ended.\")\n\n    def test_winning_on_last_guess_still_counts_as_a_win(self):\n\
  \        game = Hangman('aaa')\n        for ch in 'bcdefghij':\n            game.guess(ch)\n        game.guess('a')\n  \
  \      self.assertEqual(game.remaining_guesses, 0)\n        self.assertEqual(game.get_status(), hangman.STATUS_WIN)\n  \
  \      self.assertEqual(game.get_masked_word(), 'aaa')\n\n```\n\nYour task: Edit the starter code file(s) so ALL tests pass.\n\
