description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: book-store\n\nINSTRUCTIONS:\n#\
  \ Instructions\n\nTo try and encourage more sales of different books from a popular 5 book series, a bookshop has decided\
  \ to offer discounts on multiple book purchases.\n\nOne copy of any of the five books costs $8.\n\nIf, however, you buy\
  \ two different books, you get a 5% discount on those two books.\n\nIf you buy 3 different books, you get a 10% discount.\n\
  \nIf you buy 4 different books, you get a 20% discount.\n\nIf you buy all 5, you get a 25% discount.\n\nNote that if you\
  \ buy four books, of which 3 are different titles, you get a 10% discount on the 3 that form part of a set, but the fourth\
  \ book still costs $8.\n\nYour mission is to write code to calculate the price of any conceivable shopping basket (containing\
  \ only books of the same series), giving as big a discount as possible.\n\nFor example, how much does this basket of books\
  \ cost?\n\n- 2 copies of the first book\n- 2 copies of the second book\n- 2 copies of the third book\n- 1 copy of the fourth\
  \ book\n- 1 copy of the fifth book\n\nOne way of grouping these 8 books is:\n\n- 1 group of 5 (1st, 2nd,3rd, 4th, 5th)\n\
  - 1 group of 3 (1st, 2nd, 3rd)\n\nThis would give a total of:\n\n- 5 books at a 25% discount\n- 3 books at a 10% discount\n\
  \nResulting in:\n\n- 5 × (100% - 25%) × $8 = 5 × $6.00 = $30.00, plus\n- 3 × (100% - 10%) × $8 = 3 × $7.20 = $21.60\n\n\
  Which equals $51.60.\n\nHowever, a different way to group these 8 books is:\n\n- 1 group of 4 books (1st, 2nd, 3rd, 4th)\n\
  - 1 group of 4 books (1st, 2nd, 3rd, 5th)\n\nThis would give a total of:\n\n- 4 books at a 20% discount\n- 4 books at a\
  \ 20% discount\n\nResulting in:\n\n- 4 × (100% - 20%) × $8 = 4 × $6.40 = $25.60, plus\n- 4 × (100% - 20%) × $8 = 4 × $6.40\
  \ = $25.60\n\nWhich equals $51.20.\n\nAnd $51.20 is the price with the biggest discount.\n\nSTARTER CODE:\nFILE: book_store.py\n\
