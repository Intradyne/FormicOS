description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: connect\n\nINSTRUCTIONS:\n# Instructions\n\
  \nCompute the result for a game of Hex / Polygon.\n\nThe abstract boardgame known as [Hex][hex] / Polygon / CON-TAC-TIX\
  \ is quite simple in rules, though complex in practice.\nTwo players place stones on a parallelogram with hexagonal fields.\n\
  The player to connect his/her stones to the opposite side first wins.\nThe four sides of the parallelogram are divided between\
  \ the two players (i.e. one player gets assigned a side and the side directly opposite it and the other player gets assigned\
  \ the two other sides).\n\nYour goal is to build a program that given a simple representation of a board computes the winner\
  \ (or lack thereof).\nNote that all games need not be \"fair\".\n(For example, players may have mismatched piece counts\
  \ or the game's board might have a different width and height.)\n\nThe boards look like this:\n\n```text\n. O . X .\n .\
  \ X X O .\n  O O O X .\n   . X O X O\n    X O O O X\n```\n\n\"Player `O`\" plays from top to bottom, \"Player `X`\" plays\
  \ from left to right.\nIn the above example `O` has made a connection from left to right but nobody has won since `O` didn't\
  \ connect top and bottom.\n\n[hex]: https://en.wikipedia.org/wiki/Hex_%28board_game%29\n\nSTARTER CODE:\nFILE: connect.py\n\
  ```\n\nclass ConnectGame:\n    def __init__(self, board):\n        pass\n\n    def get_winner(self):\n        pass\n\n```\n\
  \nTEST FILE:\nFILE: connect_test.py\n```\n# These tests are auto-generated with test data from:\n# https://github.com/exercism/problem-specifications/tree/main/exercises/connect/canonical-data.json\n\
  # File last updated on 2023-07-19\n\nimport unittest\n\nfrom connect import (\n    ConnectGame,\n)\n\n\nclass ConnectTest(unittest.TestCase):\n\
  \    def test_an_empty_board_has_no_winner(self):\n        game = ConnectGame(\n            \"\"\". . . . .\n          \
  \      . . . . .\n                 . . . . .\n                  . . . . .\n                   . . . . .\"\"\"\n        )\n\
  \        winner = game.get_winner()\n        self.assertEqual(winner, \"\")\n\n    def test_x_can_win_on_a_1x1_board(self):\n\
  \        game = ConnectGame(\"\"\"X\"\"\")\n        winner = game.get_winner()\n        self.assertEqual(winner, \"X\")\n\
  \n    def test_o_can_win_on_a_1x1_board(self):\n        game = ConnectGame(\"\"\"O\"\"\")\n        winner = game.get_winner()\n\
  \        self.assertEqual(winner, \"O\")\n\n    def test_only_edges_does_not_make_a_winner(self):\n        game = ConnectGame(\n\
  \            \"\"\"O O O X\n                X . . X\n                 X . . X\n                  X O O O\"\"\"\n       \
  \ )\n        winner = game.get_winner()\n        self.assertEqual(winner, \"\")\n\n    def test_illegal_diagonal_does_not_make_a_winner(self):\n\
  \        game = ConnectGame(\n            \"\"\"X O . .\n                O X X X\n                 O X O .\n           \
  \       . O X .\n                   X X O O\"\"\"\n        )\n        winner = game.get_winner()\n        self.assertEqual(winner,\
  \ \"\")\n\n    def test_nobody_wins_crossing_adjacent_angles(self):\n        game = ConnectGame(\n            \"\"\"X .\
  \ . .\n                . X O .\n                 O . X O\n                  . O . X\n                   . . O .\"\"\"\n\
  \        )\n        winner = game.get_winner()\n        self.assertEqual(winner, \"\")\n\n    def test_x_wins_crossing_from_left_to_right(self):\n\
  \        game = ConnectGame(\n            \"\"\". O . .\n                O X X X\n                 O X O .\n           \
  \       X X O X\n                   . O X .\"\"\"\n        )\n        winner = game.get_winner()\n        self.assertEqual(winner,\
  \ \"X\")\n\n    def test_o_wins_crossing_from_top_to_bottom(self):\n        game = ConnectGame(\n            \"\"\". O .\
  \ .\n                O X X X\n                 O O O .\n                  X X O X\n                   . O X .\"\"\"\n  \
  \      )\n        winner = game.get_winner()\n        self.assertEqual(winner, \"O\")\n\n    def test_x_wins_using_a_convoluted_path(self):\n\
  \        game = ConnectGame(\n            \"\"\". X X . .\n                X . X . X\n                 . X . X .\n     \
  \             . X X . .\n                   O O O O O\"\"\"\n        )\n        winner = game.get_winner()\n        self.assertEqual(winner,\
  \ \"X\")\n\n    def test_x_wins_using_a_spiral_path(self):\n        game = ConnectGame(\n            \"\"\"O X X X X X X\
  \ X X\n                O X O O O O O O O\n                 O X O X X X X X O\n                  O X O X O O O X O\n    \
  \               O X O X X X O X O\n                    O X O O O X O X O\n                     O X X X X X O X O\n     \
  \                 O O O O O O O X O\n                       X X X X X X X X O\"\"\"\n        )\n        winner = game.get_winner()\n\
  \        self.assertEqual(winner, \"X\")\n\n```\n\nYour task: Edit the starter code file(s) so ALL tests pass.\nUse write_workspace_file\
