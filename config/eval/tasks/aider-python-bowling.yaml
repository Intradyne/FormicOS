description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: bowling\n\nINSTRUCTIONS:\n# Instructions\n\
  \nScore a bowling game.\n\nBowling is a game where players roll a heavy ball to knock down pins arranged in a triangle.\n\
  Write code to keep track of the score of a game of bowling.\n\n## Scoring Bowling\n\nThe game consists of 10 frames.\nA\
  \ frame is composed of one or two ball throws with 10 pins standing at frame initialization.\nThere are three cases for\
  \ the tabulation of a frame.\n\n- An open frame is where a score of less than 10 is recorded for the frame.\n  In this case\
  \ the score for the frame is the number of pins knocked down.\n\n- A spare is where all ten pins are knocked down by the\
  \ second throw.\n  The total value of a spare is 10 plus the number of pins knocked down in their next throw.\n\n- A strike\
  \ is where all ten pins are knocked down by the first throw.\n  The total value of a strike is 10 plus the number of pins\
  \ knocked down in the next two throws.\n  If a strike is immediately followed by a second strike, then the value of the\
  \ first strike cannot be determined until the ball is thrown one more time.\n\nHere is a three frame example:\n\n|  Frame\
  \ 1   |  Frame 2   |     Frame 3      |\n| :--------: | :--------: | :--------------: |\n| X (strike) | 5/ (spare) | 9 0\
  \ (open frame) |\n\nFrame 1 is (10 + 5 + 5) = 20\n\nFrame 2 is (5 + 5 + 9) = 19\n\nFrame 3 is (9 + 0) = 9\n\nThis means\
  \ the current running total is 48.\n\nThe tenth frame in the game is a special case.\nIf someone throws a spare or a strike\
  \ then they get one or two fill balls respectively.\nFill balls exist to calculate the total of the 10th frame.\nScoring\
  \ a strike or spare on the fill ball does not give the player more fill balls.\nThe total value of the 10th frame is the\
  \ total number of pins knocked down.\n\nFor a tenth frame of X1/ (strike and a spare), the total value is 20.\n\nFor a tenth\
  \ frame of XXX (three strikes), the total value is 30.\n\n## Requirements\n\nWrite code to keep track of the score of a\
  \ game of bowling.\nIt should support two operations:\n\n- `roll(pins : int)` is called each time the player rolls a ball.\n\
  \  The argument is the number of pins knocked down.\n- `score() : int` is called only at the very end of the game.\n  It\
  \ returns the total score for that game.\n\n\n# Instructions append\n\n## Exception messages\n\nSometimes it is necessary\
  \ to [raise an exception](https://docs.python.org/3/tutorial/errors.html#raising-exceptions). When you do this, you should\
  \ always include a **meaningful error message** to indicate what the source of the error is. This makes your code more readable\
  \ and helps significantly with debugging. For situations where you know that the error source will be a certain type, you\
  \ can choose to raise one of the [built in error types](https://docs.python.org/3/library/exceptions.html#base-classes),\
  \ but should still include a meaningful message.\n\nThis particular exercise requires that you use the [raise statement](https://docs.python.org/3/reference/simple_stmts.html#the-raise-statement)\
  \ to \"throw\" an error when the scoring or playing rules are not followed. The tests will only pass if you both `raise`\
  \ the `exception` and include a message with it.\n\nTo raise a `ValueError` with a message, write the message as an argument\
  \ to the `exception` type:\n\n```python\n# example when a bonus is attempted with an open frame\nraise IndexError(\"cannot\
  \ throw bonus with an open tenth frame\")\n\n# example when fill balls are invalid\nraise ValueError(\"invalid fill balls\"\
  )\n```\n\nSTARTER CODE:\nFILE: bowling.py\n```\nclass BowlingGame:\n    def __init__(self):\n        pass\n\n    def roll(self,\
  \ pins):\n        pass\n\n    def score(self):\n        pass\n\n```\n\nTEST FILE:\nFILE: bowling_test.py\n```\n# These tests\
