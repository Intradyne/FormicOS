  \n- Get a list of all students enrolled in a grade\n  - \"Which students are in grade 2?\"\n  - \"We've only got Jim just\
  \ now.\"\n- Get a sorted list of all students in all grades.\n  Grades should sort as 1, 2, 3, etc., and students within\
  \ a grade should be sorted alphabetically by name.\n  - \"Who all is enrolled in school right now?\"\n  - \"Let me think.\n\
  \    We have Anna, Barb, and Charlie in grade 1, Alex, Peter, and Zoe in grade 2 and Jim in grade 5.\n    So the answer\
  \ is: Anna, Barb, Charlie, Alex, Peter, Zoe and Jim\"\n\nNote that all our students only have one name (It's a small town,\
  \ what do you want?) and each student cannot be added more than once to a grade or the roster.\nIn fact, when a test attempts\
  \ to add the same student more than once, your implementation should indicate that this is incorrect.\n\n\n# Instructions\
  \ append\n\nThe tests for this exercise expect your school roster will be implemented via a School `class` in Python.\n\
  If you are unfamiliar with classes in Python, [classes][classes in python] from the Python docs is a good place to start.\n\
  \n[classes in python]: https://docs.python.org/3/tutorial/classes.html\n\nSTARTER CODE:\nFILE: grade_school.py\n```\nclass\
  \ School:\n    def __init__(self):\n        pass\n\n    def add_student(self, name, grade):\n        pass\n\n    def roster(self):\n\
  \        pass\n\n    def grade(self, grade_number):\n        pass\n\n    def added(self):\n        pass\n\n```\n\nTEST FILE:\n\
  FILE: grade_school_test.py\n```\n# These tests are auto-generated with test data from:\n# https://github.com/exercism/problem-specifications/tree/main/exercises/grade-school/canonical-data.json\n\
  # File last updated on 2023-07-19\n\nimport unittest\n\nfrom grade_school import (\n    School,\n)\n\n\nclass GradeSchoolTest(unittest.TestCase):\n\
  \    def test_roster_is_empty_when_no_student_is_added(self):\n        school = School()\n        expected = []\n\n    \
  \    self.assertEqual(school.roster(), expected)\n\n    def test_add_a_student(self):\n        school = School()\n     \
  \   school.add_student(name=\"Aimee\", grade=2)\n        expected = [True]\n        self.assertEqual(school.added(), expected)\n\
  \n    def test_student_is_added_to_the_roster(self):\n        school = School()\n        school.add_student(name=\"Aimee\"\
  , grade=2)\n        expected = [\"Aimee\"]\n\n        self.assertEqual(school.roster(), expected)\n\n    def test_adding_multiple_students_in_the_same_grade_in_the_roster(self):\n\
  \        school = School()\n        school.add_student(name=\"Blair\", grade=2)\n        school.add_student(name=\"James\"\
