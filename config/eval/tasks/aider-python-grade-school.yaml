description: "Solve the following Exercism coding exercise.\n\nLANGUAGE: python\nEXERCISE: grade-school\n\nINSTRUCTIONS:\n\
  # Instructions\n\nGiven students' names along with the grade that they are in, create a roster for the school.\n\nIn the\
