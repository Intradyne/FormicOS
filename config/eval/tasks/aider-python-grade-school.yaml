  \      self.assertEqual(school.roster(), expected)\n\n    def test_students_are_sorted_by_name_in_the_roster(self):\n  \
  \      school = School()\n        school.add_student(name=\"Peter\", grade=2)\n        school.add_student(name=\"Zoe\",\
