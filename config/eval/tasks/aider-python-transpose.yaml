  \ expected)\n\n    def test_square(self):\n        text = \"HEART\\nEMBER\\nABUSE\\nRESIN\\nTREND\"\n        expected =\
  \ \"HEART\\nEMBER\\nABUSE\\nRESIN\\nTREND\"\n\n        self.assertEqual(transpose(text), expected)\n\n    def test_rectangle(self):\n\
