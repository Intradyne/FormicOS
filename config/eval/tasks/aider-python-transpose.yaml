  \ expected)\n\n    def test_two_characters_in_a_row(self):\n        text = \"A1\"\n        expected = \"A\\n1\"\n\n    \
  \    self.assertEqual(transpose(text), expected)\n\n    def test_two_characters_in_a_column(self):\n        text = \"A\\\
  n1\"\n        expected = \"A1\"\n\n        self.assertEqual(transpose(text), expected)\n\n    def test_simple(self):\n \
  \       text = \"ABC\\n123\"\n        expected = \"A1\\nB2\\nC3\"\n\n        self.assertEqual(transpose(text), expected)\n\
  \n    def test_single_line(self):\n        text = \"Single line.\"\n        expected = \"S\\ni\\nn\\ng\\nl\\ne\\n \\nl\\\
