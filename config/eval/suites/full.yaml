# Full suite: comprehensive evaluation across all categories.
# 10 tasks: language breadth (A), multi-file depth (B), compounding (C).
task_order:
  # Category A: language breadth (simple → moderate)
  - email-validator
  - json-transformer
  - csv-analyzer
  - rate-limiter
  # Category B: multi-file depth (moderate → complex)
  - api-design
  - plugin-system
  - event-store
  # Category C: compounding clusters (complex, benefits from prior knowledge)
  - data-pipeline
  - notification-system
  - cli-framework

strategy: stigmergic
