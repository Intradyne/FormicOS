      cost_per_output_token: 0.000003    # $3.00 per 1M output tokens
      max_output_tokens: 16384
      time_multiplier: 2.0
      tool_call_multiplier: 1.0

    # --- Ollama models (local, if using Ollama instead of llama.cpp) ---
    - address: "ollama/qwen3:30b"
      endpoint: "${OLLAMA_HOST:http://localhost:11434}"
      context_window: 8192
      supports_tools: true
      supports_vision: false
      cost_per_input_token: 0.0
      cost_per_output_token: 0.0
      max_output_tokens: 4096
      time_multiplier: 1.0
      tool_call_multiplier: 1.0

    # --- Ollama Cloud (free tier, knowledge extraction archivist) ---
    - address: "ollama-cloud/qwen3-coder:480b"
      endpoint: "https://ollama.com/v1"
      api_key_env: "OLLAMA_API_KEY"
      context_window: 262144
      supports_tools: true
      supports_vision: false
      cost_per_input_token: 0.0
      cost_per_output_token: 0.0
      max_output_tokens: 16384
      time_multiplier: 3.0
      tool_call_multiplier: 1.5

embedding:
  model: "qwen3-embedding-0.6b"
  endpoint: "${EMBED_URL:http://localhost:8200}/v1/embeddings"
  dimensions: 1024
  instruction: "Given a skill description, retrieve the matching agent capability"

governance:
  max_rounds_per_colony: 25
  stall_detection_window: 3       # identical outputs for N rounds triggers warning
  convergence_threshold: 0.95     # cosine similarity between rounds
  default_budget_per_colony: 1.00 # USD
  max_redirects_per_colony: 1     # Queen can redirect at most N times per colony

routing:
  default_strategy: "stigmergic"  # or "sequential"
  tau_threshold: 0.35             # cosine similarity cutoff for DyTopo routing
  k_in_cap: 5                    # max inbound connections per agent
  pheromone_decay_rate: 0.1       # exponential decay per round
  pheromone_reinforce_rate: 0.3   # reinforcement on successful communication

  # Caste×Phase compute routing table (ADR-012).
  # Keys are phase names; values are per-caste model overrides.
  # Missing phases/castes inherit the cascade default.
  model_routing:
    execute:
      queen: "llama-cpp/gpt-4"
      coder: "llama-cpp/gpt-4"                    # local GPU, free, fast code gen
      reviewer: "openai/gpt-4o"                    # heavy cloud, best review quality
      researcher: "openai/gpt-4o-mini"             # lighter cloud, good for research
      archivist: "ollama-cloud/qwen3-coder:480b"   # free tier, async extraction
    goal:
      queen: "llama-cpp/gpt-4"
    # Heavy-tier goal phase: use Opus for maximum reasoning capability.
    # Activate by setting workspace queen model to anthropic/claude-opus-4.6.
    # Not wired as default — operator must explicitly select Opus.

# Vector store backend (ADR-013).
# Qdrant is the sole vector backend (LanceDB removed in Wave 13).
vector:
  qdrant_url: "${QDRANT_URL:http://localhost:6333}"
  qdrant_prefer_grpc: true
  collection_name: "skill_bank_v2"

# Skill bank confidence tuning (ADR-017).
skill_bank:
  confidence_prior_strength: 10.0   # initial alpha+beta sum for migration
  ucb_exploration_weight: 0.1       # c parameter in UCB formula
  dedup_exact_threshold: 0.98       # Band 1: cosine >= this → silent skip
  dedup_semantic_threshold: 0.82    # Band 2: cosine >= this → LLM classify

# Knowledge graph storage (Wave 13 A-T3).
# Archivist TKG tuples are persisted to SQLite adjacency tables.
knowledge_graph:
  entity_similarity_threshold: 0.85   # cosine threshold for entity dedup
  predicates:
    - DEPENDS_ON
    - ENABLES
    - IMPLEMENTS
    - VALIDATES
    - MIGRATED_TO
    - FAILED_ON
    - SUPERSEDES
    - DERIVED_FROM
    - RELATED_TO

# Tiered context assembly budgets (ADR-008).
# Controls how much of the context window each content tier can use.
# Scaling formula: total_budget_tokens = min(effective_ctx * 0.4, 65536).
# At 80k context: 80000 * 0.4 = 32000.
# Tiers scaled proportionally from the 8k-context baseline.
context:
  total_budget_tokens: 32000
  tier_budgets:
    goal: 2400
    routed_outputs: 12800
    max_per_source: 3600
    merge_summaries: 3600
    prev_round_summary: 3600
    skill_bank: 6000
  compaction_threshold: 2400

# Effector configuration (Wave 25).
# Gated execution tools for colonies to produce outcomes, not just text.
effectors:
  http_fetch:
    allowed_domains: ["*"]      # ["*"] for open, or list of specific domains
    max_bytes: 50000
    timeout_seconds: 10
