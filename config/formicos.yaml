# FormicOS System Configuration
# Modify these values for your deployment. Workspace-level overrides take precedence.
#
# DEFAULT STACK (RTX 5090 / 32GB VRAM):
#   LLM: Qwen3-30B-A3B via llama.cpp (--alias gpt-4), 80k ctx default
#   Embedding: Qwen3-Embedding-0.6B via llama.cpp sidecar (GPU)
#   ~27 GB VRAM total with Blackwell image. ~5 GB headroom.
#
# The provider prefix (before /) routes to the correct adapter:
#   "llama-cpp/*"    → OpenAI-compatible adapter → http://llm:8080/v1
#   "ollama/*"       → OpenAI-compatible adapter → http://ollama:11434/v1
#   "anthropic/*"    → Anthropic Messages API    → https://api.anthropic.com
#   "openai/*"       → OpenAI API               → https://api.openai.com/v1
#   "gemini/*"       → Gemini API               → https://generativelanguage.googleapis.com/v1beta
#   "deepseek/*"     → OpenAI-compatible adapter → https://api.deepseek.com
#   "minimax/*"      → OpenAI-compatible adapter → https://api.minimax.io/v1
#   "mistral/*"      → OpenAI-compatible adapter → https://api.mistral.ai/v1
#   "groq/*"         → OpenAI-compatible adapter → https://api.groq.com/openai/v1
#
# For cloud models, set defaults to "anthropic/claude-sonnet-4-6" and set ANTHROPIC_API_KEY.

system:
  host: "0.0.0.0"
  port: 8080
  data_dir: "${FORMICOS_DATA_DIR:./data}"

models:
  # Default model assignments per caste (nullable cascade: thread → workspace → system)
  # Queen needs strong tool-calling capability — Qwen3-30B-A3B is ideal.
  # The "gpt-4" alias matches --alias gpt-4 in the llama.cpp server command.
  defaults:
    queen: "llama-cpp/gpt-4"
    coder: "llama-cpp/gpt-4"
    reviewer: "llama-cpp/gpt-4"
    researcher: "llama-cpp/gpt-4"
    # archivist: "llama-cpp/gpt-4"  # Wave 57: local self-extraction
    # archivist: "ollama-cloud/qwen3-coder:480b"  # Wave 58: ollama cloud (pending)
    # archivist: "gemini/gemini-2.5-flash"  # DISABLED: Gemini tokens exhausted
    archivist: "ollama-cloud/qwen3-coder:480b"

  # Model registry — available models and their endpoints
  # cost_per_input_token / cost_per_output_token: USD per token.
  # Local models are 0.0 (hardware is a sunk cost). Cloud models use actual rates.
  # Last verified: March 24, 2026.
  registry:
    # --- llama.cpp server (default, GPU) ---
    # context_window must match docker-compose.yml LLM_CONTEXT_SIZE (default 80000).
    # The runtime also reads the live value from llama.cpp /props at startup.
    - address: "llama-cpp/gpt-4"
      endpoint: "${LLM_HOST:http://localhost:8008}"
      context_window: 80000
      supports_tools: true
      supports_vision: false
      cost_per_input_token: 0.0
      cost_per_output_token: 0.0
      max_output_tokens: 8192
      time_multiplier: 1.0
      tool_call_multiplier: 1.0

    # --- OpenAI models (require OPENAI_API_KEY) ---
