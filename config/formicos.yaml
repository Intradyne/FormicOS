      supports_vision: true
      cost_per_input_token: 0.0000025    # $2.50 per 1M input tokens
      cost_per_output_token: 0.000015    # $15.00 per 1M output tokens
      max_output_tokens: 128000
      time_multiplier: 3.0
      tool_call_multiplier: 2.0
