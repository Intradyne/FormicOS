name: git-control
version: "1.0.0"
description: "Git intelligence for the Queen"
author: "formicos-core"

tools:
  - name: git_smart_commit
    description: "Generate commit message from staged changes and commit"
    handler: tools.py::handle_smart_commit
    parameters:
      type: object
      properties:
        message_hint:
          type: string
          description: "Optional hint for the commit message"
        message:
          type: string
          description: "Commit message to execute (omit for inspection phase)"
        amend:
          type: boolean
          description: "Whether to amend the last commit (default false)"

  - name: git_branch_analysis
    description: "Analyze branch divergence and suggest merge strategy"
    handler: tools.py::handle_branch_analysis
    parameters:
      type: object
      properties:
        branch:
          type: string
          description: "Branch to analyze"
        base:
          type: string
          description: "Base branch to compare against (default 'main')"

  - name: git_create_branch
    description: "Create a new git branch and optionally switch to it"
    handler: tools.py::handle_create_branch
    parameters:
      type: object
      properties:
        branch_name:
          type: string
          description: "Name for the new branch"
        checkout:
          type: boolean
          description: "Whether to switch to the new branch (default true)"

  - name: git_stash
    description: "Save or restore stashed changes"
    handler: tools.py::handle_stash
    parameters:
      type: object
      properties:
        action:
          type: string
          description: "Action to perform: 'save', 'pop', or 'list' (default 'save')"
        message:
          type: string
          description: "Optional stash message (for 'save' action)"

handlers:
  - event: ColonyCompleted
    handler: handlers.py::on_colony_completed_auto_stage
