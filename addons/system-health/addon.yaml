name: system-health
version: "1.0.0"
description: "Live system health dashboard — colony outcomes, quality trends, pattern status, index health"
author: "formicos-core"

panels:
  - target: workspace
    display_type: status_card
    path: /overview
    handler: status.py::get_overview
    refresh_interval_s: 30

routes:
  - path: /overview
    handler: status.py::get_overview
